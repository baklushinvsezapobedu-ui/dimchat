<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DimiChat Live</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#071433;
      color:white;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    .top{
      background:#0b1b44;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:18px;
      gap:12px;
      flex-wrap:wrap;
    }

    .top-left{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .top-right{
      text-align:right;
      font-size:14px;
      color:#c7d2fe;
    }

    .status-bar{
      background:#0e214f;
      padding:10px 15px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex;
      flex-direction:column;
      gap:6px;
      font-size:14px;
    }

    .online-list{
      color:#c7d2fe;
    }

    .typing-list{
      color:#93c5fd;
      min-height:18px;
    }

    .messages{
      flex:1;
      overflow:auto;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .message{
      background:#13275c;
      padding:12px;
      border-radius:10px;
      max-width:70%;
      word-break:break-word;
    }

    .message.me{
      align-self:flex-end;
      background:#1c3b84;
    }

    .author{
      font-size:12px;
      color:#a5b4fc;
      margin-bottom:4px;
    }

    .meta{
      font-size:11px;
      color:#93a4d4;
      margin-top:6px;
    }

    .system{
      background:rgba(255,255,255,0.1);
      align-self:center;
      text-align:center;
    }

    .send{
      display:flex;
      gap:10px;
      padding:15px;
      background:#0b1b44;
    }

    .send input{
      flex:1;
      padding:12px;
      border-radius:8px;
      border:none;
      font-size:16px;
      outline:none;
    }

    button{
      padding:12px 16px;
      background:#5b5be6;
      border:none;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="top-left">
      <div><strong>DimiChat</strong></div>
      <div id="roomState" style="font-size:13px;color:#93c5fd;">Подключение...</div>
    </div>
    <div class="top-right" id="nickname"></div>
  </div>

  <div class="status-bar">
    <div id="onlineUsers" class="online-list">Онлайн: —</div>
    <div id="typingUsers" class="typing-list"></div>
  </div>

  <div id="messages" class="messages">
    <div class="message system">Добро пожаловать в чат DimiChat</div>
  </div>

  <div class="send">
    <input id="text" placeholder="Напиши сообщение" autocomplete="off" maxlength="1000" />
    <button id="sendBtn">Отправить</button>
  </div>

  <script>
    const SUPABASE_URL = "https://fftzhwgulytcdyaplszt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmdHpod2d1bHl0Y2R5YXBsc3p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjY4ODUsImV4cCI6MjA4OTI0Mjg4NX0.hqjbhMlIYPCARVjRq7qtFWvN88quKjUqRnckbW9V0kI";

    const { createClient } = window.supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_KEY);

    const messagesBox = document.getElementById("messages");
    const input = document.getElementById("text");
    const sendBtn = document.getElementById("sendBtn");
    const nicknameEl = document.getElementById("nickname");
    const roomStateEl = document.getElementById("roomState");
    const onlineUsersEl = document.getElementById("onlineUsers");
    const typingUsersEl = document.getElementById("typingUsers");

    let nickname = localStorage.getItem("dimichat_name");
    if (!nickname) {
      nickname = prompt("Введите ваш ник");
      if (!nickname || !nickname.trim()) nickname = "Гость";
      nickname = nickname.trim().slice(0, 50);
      localStorage.setItem("dimichat_name", nickname);
    }

    let clientId = localStorage.getItem("dimichat_client_id");
    if (!clientId) {
      clientId = crypto.randomUUID();
      localStorage.setItem("dimichat_client_id", clientId);
    }

    nicknameEl.textContent = "Ты: " + nickname;

    const seenMessageIds = new Set();
    let typingTimeout = null;
    let isTyping = false;
    let isSending = false;

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    function formatTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleTimeString("ru-RU", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function scrollToBottom() {
      messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    function addSystemMessage(text) {
      const msg = document.createElement("div");
      msg.className = "message system";
      msg.textContent = text;
      messagesBox.appendChild(msg);
      scrollToBottom();
    }

    function addMessage(message) {
      if (!message) return;
      if (message.id && seenMessageIds.has(message.id)) return;
      if (message.id) seenMessageIds.add(message.id);

      const msg = document.createElement("div");
      msg.className = "message" + (message.nickname === nickname ? " me" : "");

      msg.innerHTML = `
        <div class="author">${escapeHtml(message.nickname || "Без имени")}</div>
        <div>${escapeHtml(message.message || "")}</div>
        <div class="meta">${escapeHtml(formatTime(message.created_at))}</div>
      `;

      messagesBox.appendChild(msg);
      scrollToBottom();
    }

    async function loadMessages() {
      const { data, error } = await client
        .from("messages")
        .select("id, nickname, message, created_at")
        .order("created_at", { ascending: true })
        .limit(200);

      if (error) {
        console.error("Ошибка загрузки сообщений:", error);
        addSystemMessage("Не удалось загрузить историю сообщений");
        return;
      }

      messagesBox.innerHTML = '<div class="message system">Добро пожаловать в чат DimiChat</div>';
      seenMessageIds.clear();

      (data || []).forEach(addMessage);
    }

    function renderOnlineUsers(state) {
      const usersMap = new Map();

      Object.values(state).forEach((presences) => {
        presences.forEach((presence) => {
          if (!presence.nickname) return;
          usersMap.set(presence.client_id, {
            nickname: presence.nickname,
            typing: !!presence.typing
          });
        });
      });

      const users = Array.from(usersMap.values());
      const names = users.map(u => u.nickname);

      onlineUsersEl.textContent = names.length
        ? "Онлайн: " + names.join(", ")
        : "Онлайн: никого";

      const typingNames = users
        .filter(u => u.typing && u.nickname !== nickname)
        .map(u => u.nickname);

      typingUsersEl.textContent = typingNames.length
        ? typingNames.join(", ") + " печатает..."
        : "";
    }

    const roomChannel = client.channel("dimichat-room", {
      config: {
        presence: { key: clientId }
      }
    });

    roomChannel
      .on("presence", { event: "sync" }, () => {
        renderOnlineUsers(roomChannel.presenceState());
      })
      .on("presence", { event: "join" }, () => {
        renderOnlineUsers(roomChannel.presenceState());
      })
      .on("presence", { event: "leave" }, () => {
        renderOnlineUsers(roomChannel.presenceState());
      });

    const messagesChannel = client
      .channel("messages-live")
      .on(
        "postgres_changes",
        {
          event: "INSERT",
          schema: "public",
          table: "messages"
        },
        (payload) => {
          addMessage(payload.new);
        }
      )
      .subscribe((status) => {
        console.log("messages-live status:", status);
      });

    roomChannel.subscribe(async (status) => {
      roomStateEl.textContent = "Статус: " + status;

      if (status === "SUBSCRIBED") {
        await roomChannel.track({
          client_id: clientId,
          nickname,
          typing: false,
          online_at: new Date().toISOString()
        });
      }
    });

    async function updatePresenceTyping(value) {
      try {
        const result = await roomChannel.track({
          client_id: clientId,
          nickname,
          typing: value,
          online_at: new Date().toISOString()
        });

        if (result === "ok") {
          isTyping = value;
        }
      } catch (err) {
        console.warn("Ошибка обновления typing:", err);
      }
    }

    input.addEventListener("input", async () => {
      if (!isTyping) {
        await updatePresenceTyping(true);
      }

      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(async () => {
        await updatePresenceTyping(false);
      }, 1200);
    });

    input.addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        await sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isSending) return;

      isSending = true;
      sendBtn.disabled = true;

      const payload = {
        nickname: nickname.slice(0, 50),
        message: text.slice(0, 1000)
      };

      const { error } = await client
        .from("messages")
        .insert([payload]);

      if (error) {
        console.error("Ошибка отправки:", error);
        alert(
          "Не удалось отправить сообщение.\n\n" +
          "Текст ошибки: " + (error.message || "неизвестно")
        );
        isSending = false;
        sendBtn.disabled = false;
        return;
      }

      input.value = "";
      clearTimeout(typingTimeout);
      await updatePresenceTyping(false);

      isSending = false;
      sendBtn.disabled = false;
      input.focus();
    }

    window.addEventListener("beforeunload", async () => {
      try {
        await roomChannel.untrack();
        await client.removeChannel(roomChannel);
        await client.removeChannel(messagesChannel);
      } catch (e) {
        console.warn("Ошибка при отключении каналов:", e);
      }
    });

    loadMessages();
  </script>
</body>
</html>
