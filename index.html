<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DimiChat Private</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071433;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top {
      background: #0b1b44;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      font-size: 14px;
      color: #c7d2fe;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .sidebar {
      width: 320px;
      background: #0e214f;
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-weight: bold;
      color: #dbeafe;
    }

    .users-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .user-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .user-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .user-item.active {
      background: #1c3b84;
      border-color: rgba(255,255,255,0.2);
    }

    .user-name {
      font-size: 15px;
      font-weight: bold;
    }

    .user-sub {
      font-size: 12px;
      color: #a5b4fc;
      margin-top: 4px;
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .chat-header {
      background: #102554;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: #dbeafe;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chat-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .message {
      background: #13275c;
      padding: 12px;
      border-radius: 10px;
      max-width: 70%;
      word-break: break-word;
    }

    .message.me {
      align-self: flex-end;
      background: #1c3b84;
    }

    .author {
      font-size: 12px;
      color: #a5b4fc;
      margin-bottom: 4px;
    }

    .meta {
      font-size: 11px;
      color: #93a4d4;
      margin-top: 6px;
    }

    .system {
      background: rgba(255,255,255,0.1);
      align-self: center;
      text-align: center;
      max-width: 90%;
    }

    .send {
      display: flex;
      gap: 10px;
      padding: 15px;
      background: #0b1b44;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .send input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 12px 16px;
      background: #5b5be6;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      min-width: 120px;
    }

    button:hover {
      opacity: 0.95;
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .danger {
      background: #b91c1c;
    }

    .secondary {
      background: #334155;
    }

    @media (max-width: 900px) {
      .main {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 220px;
        min-height: 220px;
      }

      .message {
        max-width: 88%;
      }
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="top-left">
      <div><strong>DimiChat</strong></div>
      <div id="roomState" style="font-size:13px;color:#93c5fd;">Подключение...</div>
    </div>

    <div class="top-right">
      <div id="nickname"></div>
      <div class="top-actions">
        <button id="logoutBtn" class="secondary">Выйти</button>
      </div>
    </div>
  </div>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-header">Чаты</div>
      <div id="usersList" class="users-list"></div>
    </aside>

    <section class="chat-area">
      <div id="chatHeader" class="chat-header">
        <span id="chatTitle">Выбери пользователя слева</span>
        <div class="chat-actions">
          <button id="deleteChatBtn" class="danger" disabled>Удалить чат</button>
        </div>
      </div>

      <div id="messages" class="messages">
        <div class="message system">Здесь будут личные сообщения</div>
      </div>

      <div class="send">
        <input id="text" placeholder="Напиши сообщение" autocomplete="off" maxlength="1000" />
        <button id="sendBtn">Отправить</button>
      </div>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://fftzhwgulytcdyaplszt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmdHpod2d1bHl0Y2R5YXBsc3p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjY4ODUsImV4cCI6MjA4OTI0Mjg4NX0.hqjbhMlIYPCARVjRq7qtFWvN88quKjUqRnckbW9V0kI";

    const { createClient } = window.supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_KEY);

    const messagesBox = document.getElementById("messages");
    const input = document.getElementById("text");
    const sendBtn = document.getElementById("sendBtn");
    const nicknameEl = document.getElementById("nickname");
    const roomStateEl = document.getElementById("roomState");
    const usersListEl = document.getElementById("usersList");
    const chatTitleEl = document.getElementById("chatTitle");
    const logoutBtn = document.getElementById("logoutBtn");
    const deleteChatBtn = document.getElementById("deleteChatBtn");

    let nickname = localStorage.getItem("dimichat_name");
    if (!nickname) {
      nickname = prompt("Введите ваш ник");
      if (!nickname || !nickname.trim()) nickname = "Гость";
      nickname = nickname.trim().slice(0, 50);
      localStorage.setItem("dimichat_name", nickname);
    }

    nicknameEl.textContent = "Ты: " + nickname;

    let selectedUser = null;
    let isSending = false;
    let isDeletingChat = false;
    let isLoggingOut = false;
    let pollingInterval = null;
    let lastMessageTime = null;
    let usersCache = [];
    const seenMessageIds = new Set();

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    function formatTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleTimeString("ru-RU", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function scrollToBottom() {
      messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    function addSystemMessage(text) {
      const msg = document.createElement("div");
      msg.className = "message system";
      msg.textContent = text;
      messagesBox.appendChild(msg);
      scrollToBottom();
    }

    function clearMessages() {
      messagesBox.innerHTML = "";
      seenMessageIds.clear();
      lastMessageTime = null;
    }

    function updateDeleteButtonState() {
      deleteChatBtn.disabled = !selectedUser || isDeletingChat || isLoggingOut;
    }

    function addMessage(message) {
      if (!message) return;
      if (message.id && seenMessageIds.has(message.id)) return;
      if (message.id) seenMessageIds.add(message.id);

      const isMe = message.sender === nickname;
      const msg = document.createElement("div");
      msg.className = "message" + (isMe ? " me" : "");

      msg.innerHTML = `
        <div class="author">${escapeHtml(isMe ? "Ты" : message.sender || "Без имени")}</div>
        <div>${escapeHtml(message.message || "")}</div>
        <div class="meta">${escapeHtml(formatTime(message.created_at))}</div>
      `;

      messagesBox.appendChild(msg);

      if (!lastMessageTime || new Date(message.created_at) > new Date(lastMessageTime)) {
        lastMessageTime = message.created_at;
      }

      scrollToBottom();
    }

    async function ensureCurrentUserExists() {
      const { data, error } = await client
        .from("dimichat_users")
        .select("id, nickname")
        .eq("nickname", nickname)
        .maybeSingle();

      if (error) {
        console.error("Ошибка проверки пользователя:", error);
        return;
      }

      if (!data) {
        const { error: insertError } = await client
          .from("dimichat_users")
          .insert([{ nickname }]);

        if (insertError) {
          console.error("Ошибка создания пользователя:", insertError);
        }
      }
    }

    async function loadUsers() {
      const { data, error } = await client
        .from("dimichat_users")
        .select("id, nickname, created_at")
        .order("nickname", { ascending: true });

      if (error) {
        console.error("Ошибка загрузки пользователей:", error);
        usersListEl.innerHTML = "";
        const div = document.createElement("div");
        div.className = "user-item";
        div.textContent = "Не удалось загрузить список чатов";
        usersListEl.appendChild(div);
        return;
      }

      usersCache = (data || []).filter((user) => user.nickname !== nickname);

      if (selectedUser && !usersCache.some((user) => user.nickname === selectedUser)) {
        selectedUser = null;
        chatTitleEl.textContent = "Выбери пользователя слева";
        clearMessages();
        addSystemMessage("Выбери пользователя слева");
      }

      renderUsers();
      updateDeleteButtonState();
    }

    function renderUsers() {
      usersListEl.innerHTML = "";

      if (!usersCache.length) {
        const empty = document.createElement("div");
        empty.className = "user-item";
        empty.innerHTML = `
          <div class="user-name">Пока никого нет</div>
          <div class="user-sub">Открой чат с другого устройства или под другим ником</div>
        `;
        usersListEl.appendChild(empty);
        return;
      }

      usersCache.forEach((user) => {
        const item = document.createElement("div");
        item.className = "user-item" + (selectedUser === user.nickname ? " active" : "");
        item.innerHTML = `
          <div class="user-name">${escapeHtml(user.nickname)}</div>
          <div class="user-sub">Личная переписка</div>
        `;

        item.addEventListener("click", async () => {
          selectedUser = user.nickname;
          chatTitleEl.textContent = "Чат с " + selectedUser;
          renderUsers();
          updateDeleteButtonState();
          await loadConversation(true);
          input.focus();
        });

        usersListEl.appendChild(item);
      });
    }

    function isMessageForCurrentDialog(message) {
      if (!selectedUser) return false;

      const a = message.sender === nickname && message.recipient === selectedUser;
      const b = message.sender === selectedUser && message.recipient === nickname;
      return a || b;
    }

    async function loadConversation(initial = false) {
      if (!selectedUser) {
        clearMessages();
        addSystemMessage("Выбери пользователя слева");
        return;
      }

      let query = client
        .from("private_messages")
        .select("id, sender, recipient, message, created_at")
        .or(
          `and(sender.eq.${nickname},recipient.eq.${selectedUser}),and(sender.eq.${selectedUser},recipient.eq.${nickname})`
        )
        .order("created_at", { ascending: true });

      if (!initial && lastMessageTime) {
        query = query.gt("created_at", lastMessageTime);
      } else {
        query = query.limit(200);
      }

      const { data, error } = await query;

      if (error) {
        console.error("Ошибка загрузки переписки:", error);
        if (initial) {
          clearMessages();
          addSystemMessage("Не удалось загрузить переписку");
        }
        return;
      }

      if (initial) {
        clearMessages();
        if (!data || !data.length) {
          addSystemMessage("Начни диалог первым");
        }
      }

      (data || []).forEach(addMessage);
    }

    const messagesChannel = client
      .channel("private-messages-live")
      .on(
        "postgres_changes",
        {
          event: "*",
          schema: "public",
          table: "private_messages"
        },
        async (payload) => {
          roomStateEl.textContent = "Статус: SUBSCRIBED";

          if (payload.eventType === "INSERT" && payload.new && isMessageForCurrentDialog(payload.new)) {
            addMessage(payload.new);
          }

          if (payload.eventType === "DELETE" && selectedUser) {
            await loadConversation(true);
          }
        }
      )
      .subscribe((status) => {
        roomStateEl.textContent = "Статус: " + status;
        console.log("private-messages-live:", status);
      });

    const usersChannel = client
      .channel("users-live")
      .on(
        "postgres_changes",
        {
          event: "*",
          schema: "public",
          table: "dimichat_users"
        },
        async () => {
          await loadUsers();
        }
      )
      .subscribe((status) => {
        console.log("users-live:", status);
      });

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || !selectedUser || isSending || isDeletingChat || isLoggingOut) return;

      isSending = true;
      sendBtn.disabled = true;

      const { data, error } = await client
        .from("private_messages")
        .insert([
          {
            sender: nickname,
            recipient: selectedUser,
            message: text.slice(0, 1000)
          }
        ])
        .select("id, sender, recipient, message, created_at")
        .single();

      if (error) {
        console.error("Ошибка отправки:", error);
        alert("Не удалось отправить сообщение: " + (error.message || "неизвестно"));
        isSending = false;
        sendBtn.disabled = false;
        return;
      }

      if (data && isMessageForCurrentDialog(data)) {
        addMessage(data);
      }

      input.value = "";
      input.focus();

      isSending = false;
      sendBtn.disabled = false;
    }

    async function deleteCurrentChat() {
      if (!selectedUser || isDeletingChat || isLoggingOut) return;

      const ok = confirm(`Удалить весь чат с пользователем ${selectedUser}?`);
      if (!ok) return;

      isDeletingChat = true;
      deleteChatBtn.disabled = true;
      sendBtn.disabled = true;

      const { error } = await client
        .from("private_messages")
        .delete()
        .or(
          `and(sender.eq.${nickname},recipient.eq.${selectedUser}),and(sender.eq.${selectedUser},recipient.eq.${nickname})`
        );

      if (error) {
        console.error("Ошибка удаления чата:", error);
        alert("Не удалось удалить чат: " + (error.message || "неизвестно"));
        isDeletingChat = false;
        sendBtn.disabled = false;
        updateDeleteButtonState();
        return;
      }

      clearMessages();
      addSystemMessage("Чат удалён");
      isDeletingChat = false;
      sendBtn.disabled = false;
      updateDeleteButtonState();
    }

    async function logout() {
      if (isLoggingOut) return;

      const ok = confirm("Выйти из аккаунта?");
      if (!ok) return;

      isLoggingOut = true;
      logoutBtn.disabled = true;
      sendBtn.disabled = true;
      deleteChatBtn.disabled = true;

      try {
        await client
          .from("dimichat_users")
          .delete()
          .eq("nickname", nickname);
      } catch (e) {
        console.warn("Не удалось удалить пользователя из списка:", e);
      }

      localStorage.removeItem("dimichat_name");
      localStorage.removeItem("dimichat_client_id");

      location.reload();
    }

    input.addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        await sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);
    deleteChatBtn.addEventListener("click", deleteCurrentChat);
    logoutBtn.addEventListener("click", logout);

    async function init() {
      await ensureCurrentUserExists();
      await loadUsers();

      if (usersCache.length && !selectedUser) {
        selectedUser = usersCache[0].nickname;
        chatTitleEl.textContent = "Чат с " + selectedUser;
        renderUsers();
        updateDeleteButtonState();
        await loadConversation(true);
      } else if (!usersCache.length) {
        clearMessages();
        addSystemMessage("Пока нет других пользователей. Зайди в чат с другого устройства или под другим ником.");
      }

      pollingInterval = setInterval(async () => {
        await loadUsers();
        await loadConversation(false);
      }, 1000);
    }

    init();

    window.addEventListener("beforeunload", async () => {
      try {
        if (pollingInterval) clearInterval(pollingInterval);
        await client.removeChannel(messagesChannel);
        await client.removeChannel(usersChannel);
      } catch (e) {
        console.warn("Ошибка при отключении каналов:", e);
      }
    });
  </script>
</body>
</html>
