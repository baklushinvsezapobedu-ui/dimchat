<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DimiChat</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#071433;
color:white;
height:100vh;
}

/* экраны */

.screen{
display:none;
height:100vh;
}

.active{
display:flex;
}

/* экран входа */

.login{
align-items:center;
justify-content:center;
}

.box{
text-align:center;
width:100%;
max-width:420px;
padding:30px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
color:#cbd5e1;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
font-size:18px;
border-radius:10px;
border:none;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#5b5be6;
color:white;
cursor:pointer;
}

/* чат */

.chat{
flex-direction:column;
}

.top{
background:#0b1b44;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.messages{
flex:1;
padding:20px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
background:#13275c;
padding:10px 14px;
border-radius:10px;
max-width:70%;
}

.author{
font-size:12px;
color:#a5b4fc;
margin-bottom:4px;
}

.system{
background:rgba(255,255,255,0.1);
align-self:center;
}

.send{
display:flex;
gap:10px;
padding:15px;
background:#0b1b44;
}

.send input{
flex:1;
margin:0;
}

.send button{
width:120px;
}

</style>
</head>


<body>

<!-- экран входа -->

<div id="login" class="screen login active">

<div class="box">

<h1>DimiChat</h1>

<p>Введи свой ник</p>

<input id="nickname" placeholder="Например: Дима">

<button onclick="enterChat()">Войти</button>

</div>

</div>


<!-- экран чата -->

<div id="chat" class="screen chat">

<div class="top">

<div>DimiChat</div>

<div>Ты: <span id="myname"></span></div>

</div>


<div id="messages" class="messages">

<div class="message system">
Добро пожаловать в чат DimiChat
</div>

</div>


<div class="send">

<input id="text" placeholder="Напиши сообщение...">

<button onclick="send()">Отправить</button>

</div>

</div>



<script>

let nickname = localStorage.getItem("dimichat_name");

if(nickname){

openChat(nickname);

}

function enterChat(){

nickname = document.getElementById("nickname").value.trim();

if(!nickname){
alert("Введите ник");
return;
}

localStorage.setItem("dimichat_name",nickname);

openChat(nickname);

}

function openChat(name){

document.getElementById("login").classList.remove("active");

document.getElementById("chat").classList.add("active");

document.getElementById("myname").textContent=name;

}

function send(){

let text=document.getElementById("text");

let value=text.value.trim();

if(!value) return;

let msg=document.createElement("div");

msg.className="message";

msg.innerHTML="<div class='author'>"+nickname+"</div>"+value;

document.getElementById("messages").appendChild(msg);

text.value="";

document.getElementById("messages").scrollTop=999999;

}

</script>

</body>
</html>
