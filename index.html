<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DimiChat Live</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#071433;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

.top{
background:#0b1b44;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
}

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
background:#13275c;
padding:12px;
border-radius:10px;
max-width:70%;
}

.author{
font-size:12px;
color:#a5b4fc;
margin-bottom:4px;
}

.system{
background:rgba(255,255,255,0.1);
align-self:center;
}

.send{
display:flex;
gap:10px;
padding:15px;
background:#0b1b44;
}

.send input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:12px 16px;
background:#5b5be6;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="top">
  <div>DimiChat</div>
  <div id="nickname"></div>
</div>

<div id="messages" class="messages">
  <div class="message system">Добро пожаловать в чат DimiChat</div>
</div>

<div class="send">
  <input id="text" placeholder="Напиши сообщение">
  <button onclick="send()">Отправить</button>
</div>

<script>
const SUPABASE_URL = "https://fftzvwgulytcdyaplszt.supabase.co";
const SUPABASE_KEY = "sb_publishable_xeWjNCuSIYYfHDDm5a_i8w_vXhsaaJO";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let nickname = localStorage.getItem("dimichat_name");

if (!nickname) {
  nickname = prompt("Введите ваш ник");
  if (!nickname || !nickname.trim()) {
    nickname = "Гость";
  }
  nickname = nickname.trim();
  localStorage.setItem("dimichat_name", nickname);
}

document.getElementById("nickname").innerText = "Ты: " + nickname;

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function addMessage(name, text) {
  const msg = document.createElement("div");
  msg.className = "message";
  msg.innerHTML = "<div class='author'>" + escapeHtml(name) + "</div>" + escapeHtml(text);
  document.getElementById("messages").appendChild(msg);
  document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
}

async function load() {
  const { data, error } = await client
    .from("messages")
    .select("*")
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const box = document.getElementById("messages");
  box.innerHTML = '<div class="message system">Добро пожаловать в чат DimiChat</div>';

  data.forEach(m => {
    addMessage(m.nickname, m.message);
  });
}

async function send() {
  const input = document.getElementById("text");
  const text = input.value.trim();

  if (!text) return;

  const { error } = await client.from("messages").insert({
    nickname: nickname,
    message: text
  });

  if (error) {
    console.error(error);
    alert("Не удалось отправить сообщение");
    return;
  }

  input.value = "";
}

load();

client
  .channel("messages-live")
  .on(
    "postgres_changes",
    {
      event: "INSERT",
      schema: "public",
      table: "messages"
    },
    (payload) => {
      addMessage(payload.new.nickname, payload.new.message);
    }
  )
  .subscribe();
</script>

</body>
</html>
