<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DimiChat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#071433;
color:white;
}

.top{
background:#0b1b44;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.messages{
height:80vh;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
background:#13275c;
padding:12px;
border-radius:10px;
max-width:70%;
}

.author{
font-size:12px;
color:#a5b4fc;
margin-bottom:4px;
}

.system{
background:rgba(255,255,255,0.1);
align-self:center;
}

.send{
display:flex;
gap:10px;
padding:15px;
background:#0b1b44;
}

.send input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
}

button{
padding:12px 16px;
background:#5b5be6;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>
</head>


<body>

<div class="top">
<div>DimiChat</div>
<div id="nickname"></div>
</div>

<div id="messages" class="messages">

<div class="message system">
Добро пожаловать в чат DimiChat
</div>

</div>


<div class="send">

<input id="text" placeholder="Напиши сообщение">

<button onclick="send()">Отправить</button>

</div>



<script>

const SUPABASE_URL = "https://fftzvwgulytcdyaplszt.supabase.co";

const SUPABASE_KEY = "sb_publishable_xeWjNCuSIYYfHDDm5a_i8w_vXhsaaJO";

const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);


let nickname = localStorage.getItem("dimichat_name");

if(!nickname){

nickname = prompt("Введите ваш ник");

localStorage.setItem("dimichat_name",nickname);

}

document.getElementById("nickname").innerText="Ты: "+nickname;



async function load(){

let { data } = await client
.from("messages")
.select("*")
.order("created_at");

document.getElementById("messages").innerHTML="";

data.forEach(m=>{
addMessage(m.nickname,m.message);
});

}



function addMessage(name,text){

let msg=document.createElement("div");

msg.className="message";

msg.innerHTML="<div class='author'>"+name+"</div>"+text;

document.getElementById("messages").appendChild(msg);

}



async function send(){

let text=document.getElementById("text").value;

if(!text) return;

await client.from("messages").insert({
nickname:nickname,
message:text
});

document.getElementById("text").value="";

load();

}



load();

setInterval(load,2000);

</script>

</body>
</html>
