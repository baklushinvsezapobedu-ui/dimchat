<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DimiChat Luxe</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --panel:rgba(13,25,56,.82);
      --panel-2:rgba(18,33,73,.86);
      --line:rgba(255,255,255,.08);
      --text:#eef4ff;
      --muted:#9fb3df;
      --accent:#7c5cff;
      --accent-2:#28c7fa;
      --danger:#d83f68;
      --top-safe: env(safe-area-inset-top, 0px);
      --bottom-safe: env(safe-area-inset-bottom, 0px);
      --left-safe: env(safe-area-inset-left, 0px);
      --right-safe: env(safe-area-inset-right, 0px);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      color:var(--text);
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,92,255,.25), transparent 28%),
        radial-gradient(circle at top right, rgba(40,199,250,.18), transparent 26%),
        linear-gradient(180deg,#061126 0%, #07132b 40%, #09162e 100%);
      overflow:hidden;
      -webkit-font-smoothing:antialiased;
    }

    .ambient{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }

    .orb{
      position:absolute;
      border-radius:50%;
      filter:blur(60px);
      opacity:.35;
      animation: drift 14s ease-in-out infinite alternate;
    }

    .orb.one{width:280px;height:280px;background:#7c5cff;left:-60px;top:20px}
    .orb.two{width:320px;height:320px;background:#28c7fa;right:-90px;top:80px;animation-duration:17s}
    .orb.three{width:240px;height:240px;background:#2bd4a7;left:30%;bottom:-100px;animation-duration:20s}

    @keyframes drift{
      from{transform:translateY(0) translateX(0) scale(1)}
      to{transform:translateY(30px) translateX(20px) scale(1.08)}
    }

    .app{
      position:relative;
      z-index:1;
      height:100%;
      padding:
        calc(14px + var(--top-safe))
        calc(14px + var(--right-safe))
        calc(14px + var(--bottom-safe))
        calc(14px + var(--left-safe));
      display:grid;
      grid-template-rows:auto 1fr;
      gap:12px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:22px;
      background:rgba(10,22,50,.72);
      backdrop-filter:blur(18px);
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      min-width:0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .brand-badge{
      width:44px;height:44px;border-radius:15px;
      background:linear-gradient(135deg, rgba(124,92,255,.95), rgba(40,199,250,.9));
      display:grid;place-items:center;
      font-weight:800;font-size:18px;
      box-shadow:0 10px 30px rgba(124,92,255,.35);
      flex:0 0 auto;
    }

    .brand-meta{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .brand-title{
      font-size:18px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .brand-sub{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .user-chip{
      padding:10px 12px;
      border-radius:15px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#d9e6ff;
      font-size:13px;
      max-width:300px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .layout{
      min-height:0;
      display:grid;
      grid-template-columns:340px 1fr;
      gap:12px;
      position:relative;
    }

    .sidebar{
      min-width:0;
      border:1px solid var(--line);
      border-radius:24px;
      background:var(--panel);
      backdrop-filter:blur(18px);
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      transition:transform .28s ease, opacity .28s ease;
      z-index:6;
    }

    .sidebar-head{
      padding:16px;
      border-bottom:1px solid var(--line);
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .sidebar-title{
      font-size:18px;
      font-weight:800;
    }

    .search-wrap{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .search{
      width:100%;
      border:none;
      outline:none;
      padding:13px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:var(--text);
      font-size:16px;
    }

    .sidebar-body{
      min-height:0;
      overflow:auto;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      -webkit-overflow-scrolling:touch;
    }

    .chat-item{
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.06);
      cursor:pointer;
      transition:transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .chat-item.active{
      background:linear-gradient(135deg, rgba(124,92,255,.25), rgba(40,199,250,.14));
      border-color:rgba(124,92,255,.45);
      box-shadow:0 12px 30px rgba(124,92,255,.16);
    }

    .chat-name{
      font-weight:700;
      font-size:15px;
      margin-bottom:6px;
      word-break:break-word;
    }

    .chat-meta{
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      word-break:break-word;
    }

    .chat-pane{
      min-width:0;
      border:1px solid var(--line);
      border-radius:24px;
      background:var(--panel-2);
      backdrop-filter:blur(18px);
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      display:grid;
      grid-template-rows:auto 1fr auto;
      overflow:hidden;
    }

    .chat-header{
      padding:16px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      min-width:0;
    }

    .chat-user{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:4px;
      flex:1;
    }

    .chat-user-name{
      font-weight:800;
      font-size:18px;
      word-break:break-word;
    }

    .chat-user-id{
      color:var(--muted);
      font-size:13px;
      word-break:break-word;
    }

    .header-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .messages{
      min-height:0;
      overflow:auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
    }

    .bubble{
      max-width:min(72%, 680px);
      padding:12px 14px 10px;
      border-radius:20px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 25px rgba(0,0,0,.12);
      word-break:break-word;
    }

    .bubble.me{
      align-self:flex-end;
      background:linear-gradient(135deg, rgba(124,92,255,.34), rgba(40,199,250,.16));
      border-color:rgba(124,92,255,.4);
    }

    .bubble-head{
      font-size:12px;
      color:#b8c8ee;
      margin-bottom:6px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .bubble-body{
      font-size:15px;
      line-height:1.45;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .bubble-footer{
      margin-top:8px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .reactions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
    }

    .reaction{
      border:none;
      background:rgba(255,255,255,.08);
      color:#fff;
      padding:6px 9px;
      min-width:auto;
      font-size:13px;
      border-radius:999px;
      cursor:pointer;
    }

    .reaction.mine{
      background:rgba(124,92,255,.25);
    }

    .reaction-picker{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
      padding-top:8px;
      border-top:1px dashed rgba(255,255,255,.08);
    }

    .picker-btn{
      border:none;
      background:rgba(255,255,255,.06);
      border-radius:12px;
      padding:7px 9px;
      min-width:auto;
      cursor:pointer;
      font-size:16px;
    }

    .system{
      align-self:center;
      max-width:90%;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      color:#d4e0ff;
      font-size:14px;
      text-align:center;
    }

    .composer{
      border-top:1px solid var(--line);
      padding:14px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      background:rgba(8,18,42,.6);
    }

    .composer textarea{
      resize:none;
      min-height:56px;
      max-height:140px;
      border:none;
      outline:none;
      padding:15px 16px;
      border-radius:18px;
      color:var(--text);
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font:inherit;
      width:100%;
      font-size:16px;
    }

    .buttons-col{
      display:flex;
      gap:10px;
      align-items:flex-end;
    }

    button{
      border:none;
      outline:none;
      padding:12px 16px;
      min-width:110px;
      border-radius:16px;
      color:white;
      font-weight:700;
      font-size:14px;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    button:disabled{
      opacity:.58;
      cursor:not-allowed;
    }

    .primary{
      background:linear-gradient(135deg, var(--accent), #5fa5ff);
      box-shadow:0 12px 30px rgba(124,92,255,.26);
    }

    .secondary{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
    }

    .danger{
      background:linear-gradient(135deg, #d83f68, #b51743);
    }

    .ghost{
      background:rgba(255,255,255,.06);
      min-width:auto;
      padding:11px 14px;
    }

    .mobile-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      backdrop-filter:blur(3px);
      z-index:5;
      opacity:0;
      pointer-events:none;
      transition:.25s ease;
    }

    .mobile-overlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .mobile-chat-button{
      display:none;
      position:fixed;
      right:calc(14px + var(--right-safe));
      bottom:calc(22px + var(--bottom-safe));
      z-index:8;
      border:none;
      border-radius:999px;
      padding:14px 18px;
      background:linear-gradient(135deg, var(--accent), #5fa5ff);
      color:white;
      font-weight:800;
      font-size:14px;
      box-shadow:0 14px 34px rgba(124,92,255,.32);
    }

    @media (max-width: 980px){
      .app{
        padding:
          calc(10px + var(--top-safe))
          calc(10px + var(--right-safe))
          calc(10px + var(--bottom-safe))
          calc(10px + var(--left-safe));
        gap:10px;
      }

      .layout{
        grid-template-columns:1fr;
      }

      .sidebar{
        position:fixed;
        top:calc(10px + var(--top-safe) + 78px);
        left:calc(10px + var(--left-safe));
        bottom:calc(10px + var(--bottom-safe));
        width:min(88vw,340px);
        transform:translateX(0);
      }

      .layout.sidebar-collapsed .sidebar{
        transform:translateX(-110%);
        opacity:0;
        pointer-events:none;
      }

      .topbar{
        padding:12px;
        border-radius:20px;
        align-items:flex-start;
      }

      .top-actions{
        width:100%;
        justify-content:space-between;
      }

      .user-chip{
        max-width:100%;
        flex:1 1 100%;
      }

      .chat-pane{
        border-radius:22px;
      }

      .chat-header{
        padding:12px;
      }

      .header-actions{
        width:100%;
      }

      .header-actions button{
        width:100%;
      }

      .messages{
        padding:12px;
      }

      .bubble{
        max-width:92%;
      }

      .bubble-footer{
        flex-direction:column;
        align-items:flex-start;
      }

      .composer{
        grid-template-columns:1fr;
        padding:12px;
      }

      .buttons-col{
        width:100%;
      }

      .buttons-col button{
        width:100%;
      }

      .mobile-chat-button{
        display:block;
      }
    }

    @media (max-width: 560px){
      .topbar{
        gap:10px;
      }

      .top-actions{
        gap:8px;
      }

      .top-actions button{
        flex:1 1 auto;
        min-width:0;
      }

      .chat-user-name{
        font-size:16px;
      }

      .chat-user-id{
        font-size:12px;
      }

      .bubble{
        padding:11px 12px 10px;
        border-radius:18px;
      }

      .bubble-body{
        font-size:14px;
      }

      .composer textarea{
        min-height:52px;
        padding:13px 14px;
      }

      .search{
        padding:12px 13px;
      }

      button{
        font-size:13px;
        padding:11px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
  </div>

  <div class="mobile-overlay" id="mobileOverlay"></div>
  <button class="mobile-chat-button" id="mobileChatButton">Чаты</button>

  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge">D</div>
        <div class="brand-meta">
          <div class="brand-title">DimiChat Luxe</div>
          <div class="brand-sub" id="statusText">Подключение...</div>
        </div>
      </div>

      <div class="top-actions">
        <div class="user-chip" id="meChip">Ты: —</div>
        <button class="ghost" id="toggleSidebarBtn">Чаты</button>
        <button class="secondary" id="logoutBtn">Выйти</button>
      </div>
    </div>

    <div class="layout" id="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <div class="sidebar-title">Личные чаты</div>
          <div class="search-wrap">
            <input id="searchName" class="search" placeholder="Поиск по имени" />
            <input id="searchId" class="search" placeholder="Поиск по ID" />
          </div>
        </div>

        <div class="sidebar-body" id="usersList"></div>
      </aside>

      <section class="chat-pane">
        <div class="chat-header">
          <div class="chat-user">
            <div class="chat-user-name" id="chatName">Выбери пользователя</div>
            <div class="chat-user-id" id="chatSub">Личные сообщения и реакции</div>
          </div>

          <div class="header-actions">
            <button class="danger" id="deleteChatBtn" disabled>Удалить чат</button>
          </div>
        </div>

        <div class="messages" id="messages">
          <div class="system">Выбери пользователя слева, чтобы начать диалог.</div>
        </div>

        <div class="composer">
          <textarea id="text" placeholder="Напиши сообщение..."></textarea>
          <div class="buttons-col">
            <button class="primary" id="sendBtn" disabled>Отправить</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://fftzhwgulytcdyaplszt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmdHpod2d1bHl0Y2R5YXBsc3p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjY4ODUsImV4cCI6MjA4OTI0Mjg4NX0.hqjbhMlIYPCARVjRq7qtFWvN88quKjUqRnckbW9V0kI";
    const EMOJIS = ["❤️","👍","🔥","😂","😍","😮","👏","😢"];

    const { createClient } = window.supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_KEY);

    const layoutEl = document.getElementById("layout");
    const toggleSidebarBtn = document.getElementById("toggleSidebarBtn");
    const mobileChatButton = document.getElementById("mobileChatButton");
    const logoutBtn = document.getElementById("logoutBtn");
    const deleteChatBtn = document.getElementById("deleteChatBtn");
    const usersListEl = document.getElementById("usersList");
    const messagesEl = document.getElementById("messages");
    const textEl = document.getElementById("text");
    const sendBtn = document.getElementById("sendBtn");
    const searchNameEl = document.getElementById("searchName");
    const searchIdEl = document.getElementById("searchId");
    const meChipEl = document.getElementById("meChip");
    const statusTextEl = document.getElementById("statusText");
    const chatNameEl = document.getElementById("chatName");
    const chatSubEl = document.getElementById("chatSub");
    const mobileOverlayEl = document.getElementById("mobileOverlay");

    let nickname = localStorage.getItem("dimichat_name");
    let clientId = localStorage.getItem("dimichat_client_id");
    let myShortId = localStorage.getItem("dimichat_short_id");
    let selectedUser = null;
    let usersCache = [];
    let pollingInterval = null;
    let lastMessageTime = null;
    let isSending = false;
    let isDeleting = false;
    let openReactionPickerFor = null;
    let reactionMap = new Map();
    const seenMessageIds = new Set();

    if (!nickname) {
      nickname = prompt("Введите имя пользователя");
      if (!nickname || !nickname.trim()) nickname = "Гость";
      nickname = nickname.trim().slice(0, 50);
      localStorage.setItem("dimichat_name", nickname);
    }

    if (!clientId) {
      clientId = crypto.randomUUID();
      localStorage.setItem("dimichat_client_id", clientId);
    }

    function isMobile() {
      return window.innerWidth <= 980;
    }

    function updateOverlay() {
      const show = isMobile() && !layoutEl.classList.contains("sidebar-collapsed");
      mobileOverlayEl.classList.toggle("show", show);
    }

    function openSidebar() {
      layoutEl.classList.remove("sidebar-collapsed");
      updateOverlay();
    }

    function closeSidebar() {
      if (isMobile()) {
        layoutEl.classList.add("sidebar-collapsed");
        updateOverlay();
      }
    }

    function syncResponsiveState() {
      if (isMobile()) {
        if (!layoutEl.dataset.mobileInitialized) {
          layoutEl.classList.add("sidebar-collapsed");
          layoutEl.dataset.mobileInitialized = "1";
        }
      } else {
        layoutEl.classList.remove("sidebar-collapsed");
      }
      updateOverlay();
    }

    function randomShortId() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let out = "";
      for (let i = 0; i < 6; i++) out += chars[Math.floor(Math.random() * chars.length)];
      return out;
    }

    async function generateUniqueShortId() {
      for (let i = 0; i < 20; i++) {
        const shortId = randomShortId();
        const { data, error } = await client
          .from("dimichat_users")
          .select("id")
          .eq("short_id", shortId)
          .maybeSingle();
        if (error) continue;
        if (!data) return shortId;
      }
      return "U" + Math.random().toString(36).slice(2, 8).toUpperCase();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    function formatTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
    }

    function normalize(v) {
      return (v || "").toString().trim().toLowerCase();
    }

    function autosizeTextarea() {
      textEl.style.height = "56px";
      textEl.style.height = Math.min(textEl.scrollHeight, 140) + "px";
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setStatus(text) {
      statusTextEl.textContent = text;
    }

    function updateMeChip() {
      meChipEl.textContent = `Ты: ${nickname} • ID: ${myShortId || "—"}`;
    }

    function updateButtonsState() {
      const hasSelectedUser = !!selectedUser;
      const hasText = !!textEl.value.trim();

      sendBtn.disabled = !hasSelectedUser || !hasText || isSending;
      deleteChatBtn.disabled = !hasSelectedUser || isDeleting;
    }

    function addSystem(text) {
      const div = document.createElement("div");
      div.className = "system";
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function clearMessages() {
      messagesEl.innerHTML = "";
      seenMessageIds.clear();
      reactionMap = new Map();
      lastMessageTime = null;
      openReactionPickerFor = null;
    }

    function getDialogFilterString(a, b) {
      return `and(sender.eq.${a},recipient.eq.${b}),and(sender.eq.${b},recipient.eq.${a})`;
    }

    function currentDialogFilter() {
      if (!selectedUser) return null;
      return getDialogFilterString(nickname, selectedUser.nickname);
    }

    function isMessageForSelectedDialog(message) {
      if (!selectedUser) return false;
      return (
        (message.sender === nickname && message.recipient === selectedUser.nickname) ||
        (message.sender === selectedUser.nickname && message.recipient === nickname)
      );
    }

    function groupReactions(list) {
      const grouped = {};
      for (const r of list) {
        const key = r.emoji;
        if (!grouped[key]) grouped[key] = { emoji: key, count: 0, mine: false };
        grouped[key].count += 1;
        if (r.reactor === nickname) grouped[key].mine = true;
      }
      return Object.values(grouped);
    }

    function renderReactions(messageId) {
      const list = reactionMap.get(messageId) || [];
      const grouped = groupReactions(list);
      if (!grouped.length) return "";
      return grouped.map(item => `
        <button class="reaction ${item.mine ? "mine" : ""}" data-message-id="${messageId}" data-emoji="${item.emoji}">
          <span>${item.emoji}</span> <span>${item.count}</span>
        </button>
      `).join("");
    }

    function renderReactionPicker(messageId) {
      if (openReactionPickerFor !== messageId) return "";
      return `
        <div class="reaction-picker">
          ${EMOJIS.map(emoji => `
            <button class="picker-btn" data-picker-message-id="${messageId}" data-picker-emoji="${emoji}">${emoji}</button>
          `).join("")}
        </div>
      `;
    }

    function addMessage(message) {
      if (!message) return;
      if (message.id && seenMessageIds.has(message.id)) return;
      if (message.id) seenMessageIds.add(message.id);

      const isMe = message.sender === nickname;
      const div = document.createElement("div");
      div.className = "bubble" + (isMe ? " me" : "");
      div.dataset.messageId = message.id;

      div.innerHTML = `
        <div class="bubble-head">
          <span>${escapeHtml(isMe ? "Ты" : message.sender)}</span>
          <span>${escapeHtml(formatTime(message.created_at))}</span>
        </div>
        <div class="bubble-body">${escapeHtml(message.message)}</div>
        <div class="bubble-footer">
          <div class="reactions" id="reactions-${message.id}">
            ${renderReactions(message.id)}
          </div>
          <button class="ghost" style="min-width:auto;padding:8px 10px" data-open-picker="${message.id}">Реакция</button>
        </div>
        ${renderReactionPicker(message.id)}
      `;

      messagesEl.appendChild(div);

      if (!lastMessageTime || new Date(message.created_at) > new Date(lastMessageTime)) {
        lastMessageTime = message.created_at;
      }

      scrollToBottom();
    }

    function rerenderMessageReactions(messageId) {
      const bubble = messagesEl.querySelector(`[data-message-id="${messageId}"]`);
      if (!bubble) return;

      const reactionsContainer = bubble.querySelector(`#reactions-${messageId}`);
      if (reactionsContainer) reactionsContainer.innerHTML = renderReactions(messageId);

      const oldPicker = bubble.querySelector(".reaction-picker");
      if (oldPicker) oldPicker.remove();

      const footer = bubble.querySelector(".bubble-footer");
      if (footer) footer.insertAdjacentHTML("afterend", renderReactionPicker(messageId));
    }

    function filterUsers() {
      const qName = normalize(searchNameEl.value);
      const qId = normalize(searchIdEl.value);

      return usersCache.filter(user => {
        const okName = !qName || normalize(user.nickname).includes(qName);
        const okId = !qId || normalize(user.short_id).includes(qId);
        return okName && okId;
      });
    }

    function renderUsers() {
      usersListEl.innerHTML = "";
      const filtered = filterUsers();

      if (!filtered.length) {
        const empty = document.createElement("div");
        empty.className = "chat-item";
        empty.innerHTML = `
          <div class="chat-name">Ничего не найдено</div>
          <div class="chat-meta">Попробуй другой ID или имя</div>
        `;
        usersListEl.appendChild(empty);
        return;
      }

      filtered.forEach(user => {
        const item = document.createElement("div");
        item.className = "chat-item" + (selectedUser && selectedUser.nickname === user.nickname ? " active" : "");
        item.innerHTML = `
          <div class="chat-name">${escapeHtml(user.nickname)}</div>
          <div class="chat-meta">
            <span>ID: ${escapeHtml(user.short_id || "—")}</span>
            <span>Личный чат</span>
          </div>
        `;

        item.addEventListener("click", async () => {
          selectedUser = user;
          openReactionPickerFor = null;
          updateChatHeader();
          updateButtonsState();
          renderUsers();
          await loadConversation(true);
          closeSidebar();
        });

        usersListEl.appendChild(item);
      });
    }

    function updateChatHeader() {
      if (!selectedUser) {
        chatNameEl.textContent = "Выбери пользователя";
        chatSubEl.textContent = "Личные сообщения и реакции";
        updateButtonsState();
        return;
      }

      chatNameEl.textContent = selectedUser.nickname;
      chatSubEl.textContent = `ID: ${selectedUser.short_id || "—"}`;
      updateButtonsState();
    }

    async function ensureCurrentUserExists() {
      let { data, error } = await client
        .from("dimichat_users")
        .select("id, nickname, short_id")
        .eq("nickname", nickname)
        .maybeSingle();

      if (error) {
        console.error("Ошибка проверки пользователя:", error);
        return;
      }

      if (!data) {
        const shortId = myShortId || await generateUniqueShortId();
        const { data: inserted, error: insertError } = await client
          .from("dimichat_users")
          .insert([{ nickname, short_id: shortId }])
          .select("id, nickname, short_id")
          .single();

        if (insertError) {
          console.error("Ошибка создания пользователя:", insertError);
          return;
        }

        data = inserted;
      } else if (!data.short_id) {
        const shortId = await generateUniqueShortId();
        const { data: updated } = await client
          .from("dimichat_users")
          .update({ short_id: shortId })
          .eq("id", data.id)
          .select("id, nickname, short_id")
          .single();

        data = updated || data;
      }

      myShortId = data.short_id;
      localStorage.setItem("dimichat_short_id", myShortId);
      updateMeChip();
    }

    async function loadUsers() {
      const { data, error } = await client
        .from("dimichat_users")
        .select("id, nickname, short_id, created_at")
        .order("nickname", { ascending: true });

      if (error) {
        console.error("Ошибка загрузки пользователей:", error);
        return;
      }

      usersCache = (data || []).filter(user => user.nickname !== nickname);

      if (selectedUser) {
        const fresh = usersCache.find(u => u.nickname === selectedUser.nickname);
        if (!fresh) {
          selectedUser = null;
          clearMessages();
          addSystem("Пользователь больше недоступен.");
        } else {
          selectedUser = fresh;
        }
      }

      renderUsers();
      updateChatHeader();
      updateButtonsState();
    }

    async function loadConversation(initial = false) {
      if (!selectedUser) {
        clearMessages();
        addSystem("Выбери пользователя слева, чтобы начать диалог.");
        updateButtonsState();
        return;
      }

      let query = client
        .from("private_messages")
        .select("id, sender, recipient, message, created_at")
        .or(currentDialogFilter())
        .order("created_at", { ascending: true });

      if (!initial && lastMessageTime) {
        query = query.gt("created_at", lastMessageTime);
      } else {
        query = query.limit(200);
      }

      const { data, error } = await query;
      if (error) {
        console.error("Ошибка загрузки переписки:", error);
        if (initial) {
          clearMessages();
          addSystem("Не удалось загрузить переписку.");
        }
        updateButtonsState();
        return;
      }

      if (initial) {
        clearMessages();
        if (!data || !data.length) addSystem("Начни диалог первым.");
      }

      for (const msg of (data || [])) addMessage(msg);
      await loadReactionsForVisibleMessages();
      updateButtonsState();
    }

    async function loadReactionsForVisibleMessages() {
      const ids = [...seenMessageIds];
      if (!ids.length) return;

      const { data, error } = await client
        .from("message_reactions")
        .select("id, message_id, reactor, emoji, created_at")
        .in("message_id", ids);

      if (error) {
        console.error("Ошибка загрузки реакций:", error);
        return;
      }

      reactionMap = new Map();
      for (const row of data || []) {
        if (!reactionMap.has(row.message_id)) reactionMap.set(row.message_id, []);
        reactionMap.get(row.message_id).push(row);
      }

      ids.forEach(rerenderMessageReactions);
    }

    async function toggleReaction(messageId, emoji) {
      const current = reactionMap.get(messageId) || [];
      const mine = current.find(r => r.emoji === emoji && r.reactor === nickname);

      if (mine) {
        const { error } = await client
          .from("message_reactions")
          .delete()
          .eq("message_id", messageId)
          .eq("emoji", emoji)
          .eq("reactor", nickname);

        if (error) console.error("Ошибка удаления реакции:", error);
        return;
      }

      const { error } = await client
        .from("message_reactions")
        .insert([{ message_id: messageId, reactor: nickname, emoji }]);

      if (error) console.error("Ошибка добавления реакции:", error);
    }

    async function sendMessage() {
      const text = textEl.value.trim();
      if (!text || !selectedUser || isSending) {
        updateButtonsState();
        return;
      }

      isSending = true;
      updateButtonsState();

      const { data, error } = await client
        .from("private_messages")
        .insert([{
          sender: nickname,
          recipient: selectedUser.nickname,
          message: text.slice(0, 1000)
        }])
        .select("id, sender, recipient, message, created_at")
        .single();

      isSending = false;
      updateButtonsState();

      if (error) {
        console.error("Ошибка отправки:", error);
        alert("Не удалось отправить сообщение: " + (error.message || "неизвестно"));
        return;
      }

      if (data && isMessageForSelectedDialog(data)) addMessage(data);

      textEl.value = "";
      autosizeTextarea();
      updateButtonsState();
      textEl.focus();
    }

    async function deleteCurrentChat() {
      if (!selectedUser || isDeleting) return;
      if (!confirm(`Удалить весь чат с ${selectedUser.nickname}?`)) return;

      isDeleting = true;
      updateButtonsState();

      const { error } = await client
        .from("private_messages")
        .delete()
        .or(currentDialogFilter());

      isDeleting = false;
      updateButtonsState();

      if (error) {
        console.error("Ошибка удаления чата:", error);
        alert("Не удалось удалить чат.");
        return;
      }

      clearMessages();
      addSystem("Чат удалён.");
    }

    async function logout() {
      if (!confirm("Выйти из аккаунта?")) return;

      try {
        await client.from("dimichat_users").delete().eq("nickname", nickname);
      } catch {}

      localStorage.removeItem("dimichat_name");
      localStorage.removeItem("dimichat_client_id");
      localStorage.removeItem("dimichat_short_id");
      location.reload();
    }

    function setupEvents() {
      toggleSidebarBtn.addEventListener("click", () => {
        if (layoutEl.classList.contains("sidebar-collapsed")) {
          openSidebar();
        } else {
          closeSidebar();
        }
      });

      mobileChatButton.addEventListener("click", openSidebar);
      mobileOverlayEl.addEventListener("click", closeSidebar);

      sendBtn.addEventListener("click", sendMessage);
      deleteChatBtn.addEventListener("click", deleteCurrentChat);
      logoutBtn.addEventListener("click", logout);

      searchNameEl.addEventListener("input", renderUsers);
      searchIdEl.addEventListener("input", renderUsers);

      textEl.addEventListener("input", () => {
        autosizeTextarea();
        updateButtonsState();
      });

      textEl.addEventListener("keydown", async (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          await sendMessage();
        }
      });

      messagesEl.addEventListener("click", async (e) => {
        const openPickerBtn = e.target.closest("[data-open-picker]");
        if (openPickerBtn) {
          const messageId = Number(openPickerBtn.dataset.openPicker);
          openReactionPickerFor = openReactionPickerFor === messageId ? null : messageId;
          rerenderMessageReactions(messageId);
          return;
        }

        const pickerBtn = e.target.closest("[data-picker-message-id]");
        if (pickerBtn) {
          const messageId = Number(pickerBtn.dataset.pickerMessageId);
          const emoji = pickerBtn.dataset.pickerEmoji;
          await toggleReaction(messageId, emoji);
          openReactionPickerFor = null;
          rerenderMessageReactions(messageId);
          return;
        }

        const reactionBtn = e.target.closest("[data-message-id][data-emoji]");
        if (reactionBtn) {
          const messageId = Number(reactionBtn.dataset.messageId);
          const emoji = reactionBtn.dataset.emoji;
          await toggleReaction(messageId, emoji);
        }
      });

      window.addEventListener("resize", syncResponsiveState);
    }

    const messagesChannel = client
      .channel("private-messages-live")
      .on("postgres_changes", {
        event: "*",
        schema: "public",
        table: "private_messages"
      }, async (payload) => {
        setStatus("Соединение активно");
        if (payload.eventType === "INSERT" && payload.new && isMessageForSelectedDialog(payload.new)) {
          addMessage(payload.new);
        }
        if (payload.eventType === "DELETE" && selectedUser) {
          await loadConversation(true);
        }
      })
      .subscribe((status) => {
        setStatus("Статус: " + status);
      });

    const usersChannel = client
      .channel("users-live")
      .on("postgres_changes", {
        event: "*",
        schema: "public",
        table: "dimichat_users"
      }, async () => {
        await loadUsers();
      })
      .subscribe();

    const reactionsChannel = client
      .channel("reactions-live")
      .on("postgres_changes", {
        event: "*",
        schema: "public",
        table: "message_reactions"
      }, async (payload) => {
        const messageId = payload.new?.message_id || payload.old?.message_id;
        if (!messageId || !seenMessageIds.has(messageId)) return;

        const { data, error } = await client
          .from("message_reactions")
          .select("id, message_id, reactor, emoji, created_at")
          .eq("message_id", messageId);

        if (!error) {
          reactionMap.set(messageId, data || []);
          rerenderMessageReactions(messageId);
        }
      })
      .subscribe();

    async function init() {
      setupEvents();
      updateMeChip();
      autosizeTextarea();
      syncResponsiveState();
      updateButtonsState();

      await ensureCurrentUserExists();
      await loadUsers();

      if (usersCache.length && !selectedUser) {
        selectedUser = usersCache[0];
        updateChatHeader();
        renderUsers();
        await loadConversation(true);
      } else {
        clearMessages();
        addSystem("Пока нет других пользователей. Зайди с другого устройства или под другим именем.");
      }

      updateButtonsState();

      pollingInterval = setInterval(async () => {
        await loadUsers();
        if (selectedUser) await loadConversation(false);
      }, 1200);
    }

    init();

    window.addEventListener("beforeunload", async () => {
      try {
        if (pollingInterval) clearInterval(pollingInterval);
        await client.removeChannel(messagesChannel);
        await client.removeChannel(usersChannel);
        await client.removeChannel(reactionsChannel);
      } catch {}
    });
  </script>
</body>
</html>
