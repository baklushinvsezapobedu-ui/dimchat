<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DimiChat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071433;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .box {
      width: 100%;
      max-width: 420px;
      padding: 32px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      outline: none;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #6d6df6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #5b5be6;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>DimiChat</h1>
    <p>Введи свой ник и войди в чат</p>

    <input id="nickname" type="text" placeholder="Например: Дима" />
    <button onclick="enterChat()">Войти</button>
  </div>

  <script>
    function enterChat() {
      const nickname = document.getElementById('nickname').value.trim();

      if (!nickname) {
        alert('Введите ник');
        return;
      }

      localStorage.setItem('dimichat_nickname', nickname);
      alert('Ник сохранён: ' + nickname);
    }
  </script>
</body>
</html>
